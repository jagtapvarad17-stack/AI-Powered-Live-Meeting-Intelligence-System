<body class="bg-surface text-on-surface h-screen w-full overflow-hidden flex relative font-body selection:bg-primary-dim selection:text-white">

<div class="absolute inset-0 z-0 opacity-40 blur-sm pointer-events-none flex flex-col">
<!-- Simulated Header -->
<header class="h-20 w-full flex justify-between items-center px-12 py-4 border-b border-surface-container-low">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high"></div>
<div class="w-32 h-4 rounded bg-surface-container-high"></div>
</div>
<div class="flex gap-4">
<div class="w-24 h-8 rounded bg-surface-container-high"></div>
<div class="w-8 h-8 rounded-full bg-surface-container-high"></div>
</div>
</header>
<!-- Simulated Main Area -->
<div class="flex-1 flex p-8 gap-8">
<div class="flex-1 bg-surface-container-low rounded-2xl p-6 flex flex-col gap-4">
<div class="w-1/3 h-6 rounded bg-surface-container-high mb-4"></div>
<div class="w-full h-3 rounded bg-surface-container"></div>

</div>
</div>

<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-dim text-sm" data-icon="assignment">assignment</span>
<span class="font-label uppercase tracking-[0.05em] text-[10px] font-semibold text-primary">Task detected</span>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<div>
<p class="font-headline text-sm font-medium text-on-surface leading-snug">Finalize AWS Budget</p>
<div class="flex items-center gap-2 mt-2">
<span class="font-body text-xs text-on-surface-variant">Assigned to:</span>
<div class="flex items-center gap-1.5 bg-surface-container-highest px-2 py-1 rounded border border-outline-variant/15">
<!-- Small generic avatar -->
<img alt="John avatar" class="w-3.5 h-3.5 rounded-full object-cover" data-alt="Small headshot of a professional man with short dark hair smiling subtly against a light neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdnB1kK0_v8Ef8Qru1kOzNUdi1pFPdKFEzXJadyhjTSAQKHd_TILO0EKwV1y4wkoEFU5vV3W8Iv1QKItbCdKeQNVGYybeiMojnPfojv7MXn7Kq2mKV-42OscctHRTCi2iP1DAd9Yur3noYPeMqIStyTRb9Par33f210mwaKAqeUlUMYMKPTXZ_IAmYL00ZVTLavGrnanU6yvR8R53N28iLdB-kMoMn7DfuG2kc0b8M8ucEq9K3tHt0b-lV57wJjYgTnLHMVq_FDtw"/>
<span class="font-body text-xs font-medium text-on-surface">John</span>
</div>
</div>
</div>
<div class="flex items-center gap-3 pt-2">
<button class="flex-1 bg-gradient-to-r from-[#4F46E5] to-[#7C3AED] text-[#000000] font-body text-xs font-semibold py-2 px-3 rounded-lg hover:opacity-90 transition-opacity">
                    Confirm
                </button>
<button class="flex-1 bg-surface-container-highest border border-outline-variant/15 text-on-surface font-body text-xs font-medium py-2 px-3 rounded-lg hover:bg-surface-container-high transition-colors">
                    Edit
                </button>
</div>
</div>
<!-- Popup 2: Screenshot Capture -->

<div class="flex-1 flex flex-col justify-center">
<div class="flex items-center gap-1.5 mb-1">
<span class="material-symbols-outlined text-secondary text-xs" data-icon="photo_camera" data-weight="fill" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-headline text-sm font-medium text-on-surface">Captured slide</span>
</div>
<div class="flex items-center gap-2">

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - The Ethereal Observer</title>

                      "surface-bright": "#2c2c2f",
                      "surface-dim": "#0e0e10",
                      "tertiary-container": "#fa88c8",
                      "surface-container-lowest": "#000000",
                      "on-tertiary-fixed-variant": "#6d104e",

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0e0e10;
        }
        
        .glass-panel {
            background-color: rgba(38, 37, 40, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .ghost-border {
            border: 1px solid rgba(72, 71, 74, 0.15);
        }

        .ambient-shadow {
            box-shadow: 0 40px 60px rgba(100, 94, 251, 0.06);
        }

        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 1px #a7a5ff;
            background-color: rgba(38, 37, 40, 0.8);
            backdrop-filter: blur(10px);
        }
        
        .bg-gradient-signature {
            background: linear-gradient(to right, #4F46E5, #7C3AED);
        }

        /* Subtle Background Glows */
        .glow-blue {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, rgba(79, 70, 229, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .glow-purple {
            position: absolute;
            bottom: 20%;
            right: 20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.1) 0%, rgba(124, 58, 237, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden antialiased">
<!-- Ambient Background Glows -->
<div class="glow-blue"></div>
<div class="glow-purple"></div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Login Card -->
<div class="glass-panel rounded-[24px] p-10 ambient-shadow ghost-border flex flex-col items-center">
<!-- Brand / Header -->
<div class="mb-10 text-center">
<h1 class="text-2xl font-bold tracking-[-0.02em] text-on-surface mb-2 font-headline">The Ethereal Observer</h1>
<p class="text-sm text-on-surface-variant font-body">Sign in to your intelligence dashboard</p>
</div>
<!-- Form -->
<form class="w-full space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-[0.05em] font-semibold text-on-surface-variant font-label" for="email">Email Address</label>
<div class="relative ghost-border rounded-xl bg-transparent transition-all duration-300 input-focus-ring overflow-hidden">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-opacity-50">mail</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 text-on-surface placeholder-outline-variant focus:ring-0 focus:outline-none font-body text-sm" id="email" placeholder="agent@observer.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[10px] uppercase tracking-[0.05em] font-semibold text-on-surface-variant font-label" for="password">Security Key</label>
<a class="text-[10px] uppercase tracking-[0.05em] font-semibold text-primary hover:text-primary-dim transition-colors font-label" href="#">Recover</a>
</div>
<div class="relative ghost-border rounded-xl bg-transparent transition-all duration-300 input-focus-ring overflow-hidden">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-opacity-50">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 text-on-surface placeholder-outline-variant focus:ring-0 focus:outline-none font-body text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-8 bg-gradient-signature text-on-primary-fixed font-semibold py-3.5 px-6 rounded-xl hover:opacity-90 transition-opacity duration-300 font-body text-sm flex items-center justify-center gap-2" type="button">
<span>Authenticate</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant opacity-20"></div>
<span class="px-4 text-[10px] uppercase tracking-[0.05em] font-semibold text-on-surface-variant font-label">Or connect via</span>
<div class="flex-grow h-[1px] bg-outline-variant opacity-20"></div>
</div>
<!-- Alternative Actions -->
<div class="w-full flex flex-col gap-4">
<button class="w-full bg-surface-container-highest ghost-border text-on-surface py-3 px-6 rounded-xl hover:bg-surface-container-high transition-colors duration-300 font-body text-sm flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.67 15.63 16.89 16.79 15.73 17.57V20.34H19.29C21.38 18.42 22.56 15.6 22.56 12.25Z" fill="#4285F4"></path>
<path d="M12 23C14.97 23 17.46 22.02 19.29 20.34L15.73 17.57C14.74 18.23 13.48 18.64 12 18.64C9.13 18.64 6.7 16.71 5.83 14.12H2.15V16.97C3.96 20.58 7.7 23 12 23Z" fill="#34A853"></path>
<path d="M5.83 14.12C5.61 13.46 5.48 12.75 5.48 12C5.48 11.25 5.61 10.54 5.83 9.88V7.03H2.15C1.41 8.51 1 10.21 1 12C1 13.79 1.41 15.49 2.15 16.97L5.83 14.12Z" fill="#FBBC05"></path>
<path d="M12 5.38C13.62 5.38 15.06 5.94 16.2 7.02L19.38 3.84C17.46 2.05 14.97 1 12 1C7.7 1 3.96 3.42 2.15 7.03L5.83 9.88C6.7 7.29 9.13 5.38 12 5.38Z" fill="#EA4335"></path>
</svg>
                    Google Workspace
                </button>
<a class="w-full text-center mt-2 text-primary hover:text-primary-dim transition-colors duration-300 font-body text-sm bg-transparent" href="#">
                    Continue as Guest
                </a>
</div>
</div>
</main>
</body></html>
